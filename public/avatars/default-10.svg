<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#795548"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="35" fill="white" opacity="0.9"/>
  <!-- Body -->
  <ellipse cx="100" cy="170" rx="55" ry="50" fill="white" opacity="0.9"/>
  <!-- Friendly round eyes -->
  <circle cx="87" cy="68" r="5" fill="#795548"/>
  <circle cx="113" cy="68" r="5" fill="#795548"/>
  <!-- Eye highlights -->
  <circle cx="89" cy="66" r="1.5" fill="white"/>
  <circle cx="115" cy="66" r="1.5" fill="white"/>
  <!-- Friendly wide smile -->
  <path d="M 80 82 Q 100 100 120 82" stroke="#795548" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Friendly wave hand -->
  <circle cx="148" cy="128" r="8" fill="white" opacity="0.9"/>
  <line x1="148" y1="136" x2="145" y2="148" stroke="white" stroke-width="4" opacity="0.9" stroke-linecap="round"/>
</svg>