<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#3F51B5"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="35" fill="white" opacity="0.9"/>
  <!-- Body -->
  <ellipse cx="100" cy="170" rx="55" ry="50" fill="white" opacity="0.9"/>
  <!-- Confident half-lidded eyes -->
  <ellipse cx="87" cy="70" rx="6" ry="4" fill="#3F51B5"/>
  <ellipse cx="113" cy="70" rx="6" ry="4" fill="#3F51B5"/>
  <!-- Thick confident eyebrows -->
  <line x1="78" y1="60" x2="96" y2="62" stroke="#3F51B5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="104" y1="62" x2="122" y2="60" stroke="#3F51B5" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Confident closed-lip smile -->
  <path d="M 84 85 Q 100 95 116 85" stroke="#3F51B5" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>