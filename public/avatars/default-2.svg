<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#1368CE"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="35" fill="white" opacity="0.9"/>
  <!-- Body -->
  <ellipse cx="100" cy="170" rx="55" ry="50" fill="white" opacity="0.9"/>
  <!-- Left eye open -->
  <circle cx="87" cy="70" r="5" fill="#1368CE"/>
  <!-- Right eye winking (closed) -->
  <path d="M 108 70 Q 113 66 118 70" stroke="#1368CE" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Smirk -->
  <path d="M 85 85 Q 100 95 118 82" stroke="#1368CE" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>